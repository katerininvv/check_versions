services:
  update-tracker:
    build: .
    container_name: update-tracker
    restart: unless-stopped
    env_file: .env
    ports:
      - "${HTTPS_PORT:-18237}:${HTTPS_PORT:-18237}"
    volumes:
      - ut_data:/data
    healthcheck:
      test: ["CMD", "curl", "-fsk", "https://127.0.0.1:${HTTPS_PORT:-18237}/healthz"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 15s

volumes:
  ut_data:
    # Фиксированное имя тома: данные сохраняются при любом способе запуска
    # (ручной docker compose или Arcane) и переживают любые обновления.
    name: update_tracker_data

