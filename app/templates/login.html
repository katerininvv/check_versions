<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="robots" content="noindex, nofollow">
  <title>Вход · Update Tracker</title>
  <script>
  (function(){
    try{
      var p = localStorage.getItem('ut_theme') || 'auto', t;
      if(p==='light'||p==='dark'){ t=p; }
      else if(p==='time'){ var h=new Date().getHours(); t=(h>=7&&h<19)?'light':'dark'; }
      else { t=(window.matchMedia&&window.matchMedia('(prefers-color-scheme: dark)').matches)?'dark':'light'; }
      document.documentElement.setAttribute('data-theme', t);
    }catch(e){}
  })();
  </script>
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>
<div class="login-wrap">
  <div class="login-card">
    <div class="brand">
      <span class="beacon" aria-hidden="true"></span>
      <span class="brand-name">Update Tracker</span>
    </div>
    <div class="brand-sub">watchtower</div>

    {% if flashes %}
    <div class="flashes">
      {% for f in flashes %}<div class="flash {{ f.kind }}">{{ f.msg }}</div>{% endfor %}
    </div>
    {% endif %}

    <form method="post" action="/login" class="stack">
      <div class="field">
        <label for="login">Логин</label>
        <input id="login" name="login" autocomplete="username" autofocus required>
      </div>
      <div class="field">
        <label for="password">Пароль</label>
        <input id="password" name="password" type="password" autocomplete="current-password" required>
      </div>
      <button class="btn" type="submit">Войти</button>
    </form>
  </div>
</div>
</body>
</html>
